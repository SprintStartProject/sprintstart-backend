sprintstart:
  crypto:
    master-key: deadbeef
    salt: deadbeef

spring:
  datasource:
    url: jdbc:h2:mem:mydb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop

  modulith:
    events:
      jdbc:
        schema-initialization:
          enabled: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost/test-realm
          jwk-set-uri: http://localhost/test-realm/protocol/openid-connect/certs
