paths:
  - phases:
    - position: 0
      title: "Frontend Foundations"
      description: "Get familiar with our frontend architecture, development standards, tooling and UI conventions"
      steps:
        - position: 0
          title: "Watch the frontend architecture overview"
          description: "High-level walkthrough of our frontend app structure, routing, state management and backend communication"
          type: VIDEO
          estimatedMinutes: 35
          expectedOutcome: "Understand how the frontend is organized and how the main application parts work together"
          tasks: [ ]
          resources:
            - title: "Frontend Architecture Overview Video"
              description: "Introduction to our React, TypeScript and application architecture"
              url: "https://internal.example.com/videos/frontend-architecture"

        - position: 1
          title: "Read the frontend coding standards"
          description: "Learn our conventions for components, hooks, styling, state management and code organization"
          type: DOCUMENT
          estimatedMinutes: 45
          expectedOutcome: "Know how frontend code should be structured, named and reviewed"
          tasks:
            - position: 0
              title: "Read the component structure guidelines"
              description: "Understand how reusable and feature-specific components are organized"
            - position: 1
              title: "Read the naming conventions"
              description: "Learn how files, components, hooks and utility functions are named"
            - position: 2
              title: "Read the state management rules"
              description: "Understand when to use local state, context, server state or global state"
            - position: 3
              title: "Read the styling conventions"
              description: "Learn how Tailwind, design tokens and custom CSS are used"
            - position: 4
              title: "Read the code review expectations"
              description: "Understand what reviewers look for in frontend PRs"
          resources:
            - title: "Frontend Coding Standards"
              description: "Main frontend conventions for structure, naming and implementation"
              url: "https://internal.example.com/frontend-coding-standards"
            - title: "Component Guidelines"
              description: "Rules and examples for writing maintainable components"
              url: "https://internal.example.com/component-guidelines"

        - position: 2
          title: "Set up the frontend development environment"
          description: "Install required tools, configure the project and run the frontend locally"
          type: TASK
          estimatedMinutes: 70
          expectedOutcome: "Frontend application running locally with hot reload, linting and formatting working"
          tasks:
            - position: 0
              title: "Install Node.js"
              description: "Use the version specified in the project configuration"
            - position: 1
              title: "Install pnpm"
              description: "Install the package manager version used by the team"
            - position: 2
              title: "Install dependencies"
              description: "Run the documented install command in the project root"
            - position: 3
              title: "Configure local environment variables"
              description: "Copy the example environment file and fill in local values"
            - position: 4
              title: "Start the development server"
              description: "Run the frontend locally and verify that the app loads in the browser"
            - position: 5
              title: "Run linting and formatting checks"
              description: "Verify that code quality tools are configured correctly"
          resources:
            - title: "Frontend Local Setup Guide"
              description: "Step-by-step instructions for running the frontend locally"
              url: "https://internal.example.com/frontend-local-setup"
            - title: "Frontend Environment Variables"
              description: "Overview of local and staging frontend configuration"
              url: "https://internal.example.com/frontend-env-vars"

        - position: 3
          title: "Read the design system and UI guidelines"
          description: "Learn how layouts, components, typography, spacing and colors are standardized"
          type: DOCUMENT
          estimatedMinutes: 50
          expectedOutcome: "Know how to build UI consistently using the shared design system"
          tasks:
            - position: 0
              title: "Read the design token guide"
              description: "Understand how spacing, colors, typography and breakpoints are defined"
            - position: 1
              title: "Read the component library guide"
              description: "Learn which shared components exist and when to use them"
            - position: 2
              title: "Read the layout guidelines"
              description: "Understand common page layouts, grids and responsive behavior"
            - position: 3
              title: "Read the form design rules"
              description: "Learn how forms, validation messages and input states are built"
            - position: 4
              title: "Read the empty and loading state guidelines"
              description: "Understand how loading, empty, error and success states are represented"
          resources:
            - title: "Design System Guide"
              description: "Main documentation for UI patterns and visual standards"
              url: "https://internal.example.com/design-system"
            - title: "Component Library"
              description: "Shared frontend component library with usage examples"
              url: "https://internal.example.com/component-library"

        - position: 4
          title: "Explore the frontend project structure"
          description: "Inspect routes, features, components, hooks, API clients and shared utilities"
          type: TASK
          estimatedMinutes: 60
          expectedOutcome: "Understand where frontend code lives and how features are organized"
          tasks:
            - position: 0
              title: "Review the routing setup"
              description: "Find how URLs are mapped to pages and layouts"
            - position: 1
              title: "Review the feature directories"
              description: "Understand how feature-specific code is grouped"
            - position: 2
              title: "Review shared components"
              description: "Find reusable UI components used across the app"
            - position: 3
              title: "Review custom hooks"
              description: "Understand how frontend logic is extracted and reused"
            - position: 4
              title: "Review API client utilities"
              description: "Find how requests to the backend are created and typed"
            - position: 5
              title: "Write down questions"
              description: "Note unclear files, conventions or dependencies to discuss with your mentor"
          resources:
            - title: "Frontend Project Structure"
              description: "Overview of folders, modules and ownership areas"
              url: "https://internal.example.com/frontend-project-structure"
            - title: "Routing Overview"
              description: "How application routing and layouts are structured"
              url: "https://internal.example.com/routing-overview"

    - position: 1
      title: "Codebase and Feature Workflow Walkthrough"
      description: "Understand how frontend features are implemented, tested, integrated and reviewed"
      steps:
        - position: 0
          title: "Watch the frontend feature workflow"
          description: "Walkthrough of implementing a frontend feature from ticket to merged PR"
          type: VIDEO
          estimatedMinutes: 35
          expectedOutcome: "Understand the normal frontend development flow from requirements to review"
          tasks: [ ]
          resources:
            - title: "Frontend Feature Workflow Video"
              description: "Walkthrough of building, testing and reviewing a frontend feature"
              url: "https://internal.example.com/videos/frontend-feature-workflow"

        - position: 1
          title: "Read the API integration guide"
          description: "Learn how the frontend calls backend APIs, handles errors and manages loading states"
          type: DOCUMENT
          estimatedMinutes: 45
          expectedOutcome: "Know how to fetch data and handle backend responses consistently"
          tasks:
            - position: 0
              title: "Read the data fetching patterns"
              description: "Understand how server state is loaded, cached and invalidated"
            - position: 1
              title: "Read the API client conventions"
              description: "Learn how request functions and response types are structured"
            - position: 2
              title: "Read the error handling guide"
              description: "Understand how validation errors, permission errors and server errors are displayed"
            - position: 3
              title: "Read the loading state rules"
              description: "Learn how loading indicators and skeletons are used"
            - position: 4
              title: "Read the optimistic update rules"
              description: "Understand when optimistic UI updates are allowed"
          resources:
            - title: "API Integration Guide"
              description: "Frontend standards for talking to backend services"
              url: "https://internal.example.com/api-integration"
            - title: "React Query Guide"
              description: "Internal guide for query keys, mutations and cache invalidation"
              url: "https://internal.example.com/react-query-guide"

        - position: 2
          title: "Trace a complete frontend feature"
          description: "Pick an existing feature and follow it from route to page, components, state and API calls"
          type: TASK
          estimatedMinutes: 90
          expectedOutcome: "Understand how a full frontend feature is wired together"
          tasks:
            - position: 0
              title: "Pick a completed feature"
              description: "Choose a feature with routing, UI, data fetching and tests"
            - position: 1
              title: "Trace the route"
              description: "Find the route definition and page component"
            - position: 2
              title: "Trace the page structure"
              description: "Understand how the page is split into sections and components"
            - position: 3
              title: "Trace data fetching"
              description: "Find the query or mutation hooks used by the feature"
            - position: 4
              title: "Trace form handling"
              description: "Review validation, submit behavior and error display if the feature has forms"
            - position: 5
              title: "Trace tests"
              description: "Find automated tests or documented manual test cases for the feature"
            - position: 6
              title: "Write down questions"
              description: "Note unclear implementation decisions to discuss with your mentor"
          resources:
            - title: "Frontend Feature Walkthrough Example"
              description: "Example of tracing a feature through the frontend codebase"
              url: "https://internal.example.com/frontend-feature-walkthrough"
            - title: "Feature Directory Guide"
              description: "How feature modules are organized"
              url: "https://internal.example.com/feature-directory-guide"

        - position: 3
          title: "Read the frontend testing strategy"
          description: "Learn how unit, component, integration and end-to-end tests are used"
          type: DOCUMENT
          estimatedMinutes: 45
          expectedOutcome: "Know which frontend tests to write for different kinds of changes"
          tasks:
            - position: 0
              title: "Read the component testing rules"
              description: "Understand how UI behavior should be tested"
            - position: 1
              title: "Read the hook testing rules"
              description: "Learn how custom hooks and reusable logic are tested"
            - position: 2
              title: "Read the API mocking strategy"
              description: "Understand how backend responses are mocked in frontend tests"
            - position: 3
              title: "Read the end-to-end testing rules"
              description: "Learn when browser-level tests are needed"
            - position: 4
              title: "Read the visual regression process"
              description: "Understand how visual changes are reviewed and approved"
          resources:
            - title: "Frontend Testing Strategy"
              description: "Testing standards for frontend features and components"
              url: "https://internal.example.com/frontend-testing-strategy"
            - title: "Frontend Test Examples"
              description: "Examples of component, hook and integration tests"
              url: "https://internal.example.com/frontend-test-examples"

        - position: 4
          title: "Run and inspect frontend tests"
          description: "Execute frontend checks locally and understand common failures"
          type: TASK
          estimatedMinutes: 75
          expectedOutcome: "Know how to run frontend tests and investigate failed checks"
          tasks:
            - position: 0
              title: "Run the unit test suite"
              description: "Execute the standard frontend unit test command"
            - position: 1
              title: "Run a single test file"
              description: "Execute tests for one selected component or feature"
            - position: 2
              title: "Run linting"
              description: "Check for code quality and style issues"
            - position: 3
              title: "Run type checking"
              description: "Verify TypeScript correctness across the project"
            - position: 4
              title: "Inspect a failing test"
              description: "Understand how assertion failures and rendered output are shown"
            - position: 5
              title: "Inspect CI test output"
              description: "Review where frontend test results appear in the pipeline"
          resources:
            - title: "Frontend Test Running Guide"
              description: "How to run frontend tests, linting and type checks locally"
              url: "https://internal.example.com/frontend-test-running"
            - title: "Frontend CI Checks"
              description: "Overview of automated frontend checks in CI"
              url: "https://internal.example.com/frontend-ci-checks"

        - position: 5
          title: "Read the accessibility and browser support guide"
          description: "Learn accessibility requirements, keyboard navigation rules and supported browser expectations"
          type: DOCUMENT
          estimatedMinutes: 45
          expectedOutcome: "Know how to build frontend changes that are accessible and work across supported browsers"
          tasks:
            - position: 0
              title: "Read the keyboard navigation rules"
              description: "Understand how interactive UI must work without a mouse"
            - position: 1
              title: "Read the ARIA usage guidelines"
              description: "Learn when ARIA attributes are useful and when native HTML is preferred"
            - position: 2
              title: "Read the color contrast requirements"
              description: "Understand contrast and visual readability expectations"
            - position: 3
              title: "Read the responsive design rules"
              description: "Learn how pages should behave on different screen sizes"
          resources:
            - title: "Accessibility Guide"
              description: "Frontend accessibility standards and examples"
              url: "https://internal.example.com/accessibility"
            - title: "Browser Support Matrix"
              description: "Supported browsers and testing expectations"
              url: "https://internal.example.com/browser-support"

    - position: 2
      title: "First Frontend Contribution"
      description: "Deliver your first real frontend change through the normal development, testing and review process"
      steps:
        - position: 0
          title: "Watch the frontend PR and review process video"
          description: "How frontend changes are prepared, reviewed, tested and merged"
          type: VIDEO
          estimatedMinutes: 25
          expectedOutcome: "Know what a good frontend PR looks like and what reviewers expect"
          tasks: [ ]
          resources:
            - title: "Frontend PR Process Video"
              description: "Walkthrough of opening, reviewing and merging frontend changes"
              url: "https://internal.example.com/videos/frontend-pr-process"

        - position: 1
          title: "Read the frontend PR checklist"
          description: "Learn what must be checked before requesting frontend code review"
          type: DOCUMENT
          estimatedMinutes: 35
          expectedOutcome: "Know how to self-review frontend changes before opening a PR"
          tasks:
            - position: 0
              title: "Read the functionality checklist"
              description: "Verify that the implementation satisfies the ticket requirements"
            - position: 1
              title: "Read the UI consistency checklist"
              description: "Check spacing, typography, colors and component usage"
            - position: 2
              title: "Read the accessibility checklist"
              description: "Verify keyboard navigation, labels and contrast"
            - position: 3
              title: "Read the responsive design checklist"
              description: "Check behavior on supported screen sizes"
            - position: 4
              title: "Read the test coverage checklist"
              description: "Know what tests or manual evidence are expected"
          resources:
            - title: "Frontend PR Checklist"
              description: "Pre-review checklist for frontend changes"
              url: "https://internal.example.com/frontend-pr-checklist"
            - title: "Frontend Review Guidelines"
              description: "How frontend pull requests are reviewed"
              url: "https://internal.example.com/frontend-review-guidelines"

        - position: 2
          title: "Implement a small frontend feature"
          description: "Pick up a low-risk frontend ticket and implement a focused UI or behavior change"
          type: TASK
          estimatedMinutes: 130
          expectedOutcome: "First frontend feature or UI change implemented and ready for review"
          tasks:
            - position: 0
              title: "Pick a good-first frontend ticket"
              description: "Choose a small, low-risk frontend task with your mentor"
            - position: 1
              title: "Review the requirements"
              description: "Read the ticket, acceptance criteria and design notes"
            - position: 2
              title: "Create a feature branch"
              description: "Branch from the current main development branch"
            - position: 3
              title: "Locate the affected route or component"
              description: "Find where the required change belongs in the codebase"
            - position: 4
              title: "Implement the UI change"
              description: "Build the component, page section or behavior using team conventions"
            - position: 5
              title: "Connect API data if needed"
              description: "Use the existing API client and data fetching patterns"
          resources:
            - title: "Frontend Good First Issues"
              description: "Board filtered for low-risk frontend starter tickets"
              url: "https://internal.example.com/jira/frontend-good-first-issues"
            - title: "Frontend Implementation Example"
              description: "Example of implementing a frontend change end to end"
              url: "https://internal.example.com/frontend-implementation-example"

        - position: 3
          title: "Add tests for the frontend change"
          description: "Write or update tests that cover the new UI behavior"
          type: TASK
          estimatedMinutes: 90
          expectedOutcome: "Frontend change covered by useful automated or documented manual tests"
          tasks:
            - position: 0
              title: "Add or update component tests"
              description: "Cover the visible behavior and user interactions"
            - position: 1
              title: "Add hook or utility tests if needed"
              description: "Cover reusable logic introduced by the change"
            - position: 2
              title: "Mock API responses"
              description: "Use the team's API mocking approach for server data"
            - position: 3
              title: "Test loading and error states"
              description: "Verify non-happy-path UI behavior"
            - position: 4
              title: "Run targeted tests"
              description: "Execute the test files affected by the change"
          resources:
            - title: "Frontend Test Writing Guide"
              description: "How to write useful frontend tests"
              url: "https://internal.example.com/frontend-test-writing-guide"
            - title: "API Mocking Examples"
              description: "Examples of mocking backend responses in frontend tests"
              url: "https://internal.example.com/api-mocking-examples"

        - position: 4
          title: "Open a frontend PR and address feedback"
          description: "Submit the frontend change for review and iterate on reviewer comments"
          type: TASK
          estimatedMinutes: 90
          expectedOutcome: "First frontend PR reviewed, improved and merged"
          tasks:
            - position: 0
              title: "Write a clear PR description"
              description: "Explain what changed, why it changed and how it was tested"
            - position: 1
              title: "Link the related ticket"
              description: "Connect the PR to the issue or requirement it implements"
            - position: 2
              title: "Include screenshots or recordings"
              description: "Attach visual evidence for UI changes"
            - position: 3
              title: "Request frontend review"
              description: "Ask the appropriate frontend teammate to review the PR"
            - position: 4
              title: "Address review comments"
              description: "Apply requested changes and explain any trade-offs"
            - position: 5
              title: "Verify CI is green"
              description: "Confirm all automated checks pass before merge"
            - position: 6
              title: "Merge using the team process"
              description: "Follow the team's merge strategy and branch cleanup rules"
          resources:
            - title: "Frontend PR Template"
              description: "Template for documenting frontend changes"
              url: "https://internal.example.com/frontend-pr-template"
            - title: "Frontend Review Checklist"
              description: "Reviewer checklist for frontend pull requests"
              url: "https://internal.example.com/frontend-review-checklist"

        - position: 5
          title: "Improve frontend documentation"
          description: "Update one frontend guide, README section or component documentation page based on what you learned"
          type: TASK
          estimatedMinutes: 60
          expectedOutcome: "A useful frontend documentation improvement reviewed and published"
          tasks:
            - position: 0
              title: "Choose a documentation improvement"
              description: "Find one unclear, outdated or missing frontend documentation area"
            - position: 1
              title: "Validate the current instructions"
              description: "Check whether the documented commands and explanations still work"
            - position: 2
              title: "Add missing context"
              description: "Clarify setup steps, component usage, API integration or troubleshooting notes"
            - position: 3
              title: "Ask for team review"
              description: "Have another frontend developer verify correctness"
          resources:
            - title: "Frontend Documentation Guide"
              description: "How frontend documentation should be written and maintained"
              url: "https://internal.example.com/frontend-documentation-guide"
            - title: "Frontend Knowledge Base"
              description: "Main location for frontend documentation, guides and troubleshooting notes"
              url: "https://internal.example.com/frontend-knowledge-base"