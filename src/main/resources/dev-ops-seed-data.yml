paths:
  - phases:
    - position: 0
      title: "DevOps Foundations"
      description: "Get familiar with our infrastructure, tooling, deployment model and operational standards"
      steps:
        - position: 0
          title: "Watch the DevOps architecture overview"
          description: "High-level walkthrough of our infrastructure, environments, deployment flow and responsibilities"
          type: VIDEO
          estimatedMinutes: 35
          expectedOutcome: "Understand how our systems are hosted, deployed, monitored and maintained"
          tasks: [ ]
          resources:
            - title: "DevOps Architecture Overview"
              description: "Overview of our infrastructure, environments and deployment process"
              url: "https://internal.example.com/videos/devops-architecture"

        - position: 1
          title: "Read the infrastructure overview"
          description: "Learn how our cloud infrastructure, networking and environments are structured"
          type: DOCUMENT
          estimatedMinutes: 45
          expectedOutcome: "Know the main infrastructure components and how staging and production are separated"
          tasks:
            - position: 0
              title: "Read the cloud account structure"
              description: "Understand how accounts, projects or subscriptions are organized"
            - position: 1
              title: "Read the environment overview"
              description: "Learn the difference between local, development, staging and production"
            - position: 2
              title: "Read the networking overview"
              description: "Understand VPCs, subnets, ingress, egress and internal services"
            - position: 3
              title: "Read the access control model"
              description: "Understand how infrastructure permissions are granted and reviewed"
          resources:
            - title: "Infrastructure Overview"
              description: "Main documentation for our cloud and environment setup"
              url: "https://internal.example.com/infrastructure-overview"
            - title: "Access Control Guide"
              description: "How permissions and roles are managed for infrastructure"
              url: "https://internal.example.com/access-control-guide"

        - position: 2
          title: "Set up local DevOps tooling"
          description: "Install and configure the CLI tools needed for infrastructure and deployment work"
          type: TASK
          estimatedMinutes: 60
          expectedOutcome: "All required DevOps tools installed, authenticated and ready to use"
          tasks:
            - position: 0
              title: "Install Docker"
              description: "Install Docker and verify containers can run locally"
            - position: 1
              title: "Install Kubernetes CLI"
              description: "Install kubectl and verify the configured version"
            - position: 2
              title: "Install Helm"
              description: "Install Helm and verify it can render charts locally"
            - position: 3
              title: "Install Terraform"
              description: "Install the Terraform version used by the team"
            - position: 4
              title: "Install cloud provider CLI"
              description: "Install and authenticate the CLI for our cloud provider"
            - position: 5
              title: "Verify repository tooling"
              description: "Run the documented setup command and verify all required tools are detected"
          resources:
            - title: "DevOps Local Setup Guide"
              description: "Step-by-step setup for local DevOps tooling"
              url: "https://internal.example.com/devops-local-setup"
            - title: "Tool Version Matrix"
              description: "Supported versions for Docker, kubectl, Helm, Terraform and cloud CLIs"
              url: "https://internal.example.com/devops-tool-versions"

        - position: 3
          title: "Read the security and secrets handling guide"
          description: "Understand how secrets, credentials and sensitive configuration are managed"
          type: DOCUMENT
          estimatedMinutes: 40
          expectedOutcome: "Know how to handle secrets safely and avoid leaking sensitive configuration"
          tasks:
            - position: 0
              title: "Read the secrets storage policy"
              description: "Learn where secrets may and may not be stored"
            - position: 1
              title: "Read the credential rotation process"
              description: "Understand how keys and credentials are rotated"
            - position: 2
              title: "Read the incident escalation rules"
              description: "Know what to do if a secret is accidentally exposed"
          resources:
            - title: "Secrets Handling Guide"
              description: "Rules for managing secrets and credentials"
              url: "https://internal.example.com/secrets-handling"
            - title: "Security Incident Process"
              description: "How to report and handle security incidents"
              url: "https://internal.example.com/security-incident-process"

    - position: 1
      title: "Platform and Deployment Walkthrough"
      description: "Understand how services are built, shipped, deployed, observed and operated"
      steps:
        - position: 0
          title: "Watch the CI/CD pipeline walkthrough"
          description: "Walkthrough of our build, test, security scanning and deployment pipelines"
          type: VIDEO
          estimatedMinutes: 40
          expectedOutcome: "Understand how code moves from commit to production"
          tasks: [ ]
          resources:
            - title: "CI/CD Pipeline Walkthrough"
              description: "Video explaining our pipeline stages and deployment flow"
              url: "https://internal.example.com/videos/cicd-pipeline"

        - position: 1
          title: "Read the CI/CD standards"
          description: "Learn how pipelines are structured and what checks are required before deployment"
          type: DOCUMENT
          estimatedMinutes: 45
          expectedOutcome: "Know how to read, maintain and extend CI/CD pipelines safely"
          tasks:
            - position: 0
              title: "Read the build stage rules"
              description: "Understand how services are built and packaged"
            - position: 1
              title: "Read the test stage rules"
              description: "Understand required unit, integration and smoke test stages"
            - position: 2
              title: "Read the security scan rules"
              description: "Understand dependency, container and secret scanning requirements"
            - position: 3
              title: "Read the deployment approval rules"
              description: "Understand when manual approval is required"
          resources:
            - title: "CI/CD Standards"
              description: "Team standards for pipeline design and deployment safety"
              url: "https://internal.example.com/cicd-standards"
            - title: "Deployment Checklist"
              description: "Checklist used before deploying to staging or production"
              url: "https://internal.example.com/deployment-checklist"

        - position: 2
          title: "Explore the Kubernetes platform"
          description: "Inspect the cluster structure, namespaces, workloads and service configuration"
          type: TASK
          estimatedMinutes: 75
          expectedOutcome: "Understand how applications run inside our Kubernetes platform"
          tasks:
            - position: 0
              title: "List available namespaces"
              description: "Use kubectl to inspect the namespaces you have access to"
            - position: 1
              title: "Inspect application deployments"
              description: "Look at deployments, pods, services and ingress resources"
            - position: 2
              title: "Review resource requests and limits"
              description: "Check CPU and memory configuration for selected workloads"
            - position: 3
              title: "Inspect config maps and secrets usage"
              description: "Understand how runtime configuration is mounted or injected"
            - position: 4
              title: "Check rollout history"
              description: "Use rollout commands to inspect recent deployment history"
          resources:
            - title: "Kubernetes Platform Guide"
              description: "Documentation for our Kubernetes cluster layout"
              url: "https://internal.example.com/kubernetes-platform"
            - title: "Kubernetes Runbook"
              description: "Common kubectl commands and troubleshooting steps"
              url: "https://internal.example.com/kubernetes-runbook"

        - position: 3
          title: "Read the infrastructure-as-code guide"
          description: "Learn how Terraform modules, state, reviews and changes are handled"
          type: DOCUMENT
          estimatedMinutes: 50
          expectedOutcome: "Know how infrastructure changes are proposed, reviewed and applied"
          tasks:
            - position: 0
              title: "Read the Terraform module structure"
              description: "Understand how reusable modules are organized"
            - position: 1
              title: "Read the state management rules"
              description: "Understand remote state, locking and environment separation"
            - position: 2
              title: "Read the plan and apply process"
              description: "Know when and how Terraform plans are reviewed and applied"
            - position: 3
              title: "Read the rollback expectations"
              description: "Understand how infrastructure changes should be reverted if needed"
          resources:
            - title: "Infrastructure as Code Guide"
              description: "Our Terraform standards and workflow"
              url: "https://internal.example.com/iac-guide"
            - title: "Terraform Module Catalog"
              description: "List of reusable infrastructure modules"
              url: "https://internal.example.com/terraform-modules"

        - position: 4
          title: "Explore monitoring and logging"
          description: "Use dashboards, logs and alerts to understand service health"
          type: TASK
          estimatedMinutes: 70
          expectedOutcome: "Know where to find operational signals and how to investigate common issues"
          tasks:
            - position: 0
              title: "Open the main platform dashboard"
              description: "Review overall service health, latency, error rate and traffic"
            - position: 1
              title: "Inspect service-specific dashboards"
              description: "Pick one service and review its metrics"
            - position: 2
              title: "Search application logs"
              description: "Find logs for a selected deployment and filter by severity"
            - position: 3
              title: "Review alert definitions"
              description: "Understand the alerts configured for critical services"
            - position: 4
              title: "Trace one example request"
              description: "Follow an example request through logs, metrics or tracing tools"
          resources:
            - title: "Monitoring Guide"
              description: "How to use dashboards, metrics and alerts"
              url: "https://internal.example.com/monitoring-guide"
            - title: "Logging Guide"
              description: "How application and infrastructure logs are collected and queried"
              url: "https://internal.example.com/logging-guide"
            - title: "Alerting Standards"
              description: "Rules for creating and maintaining alerts"
              url: "https://internal.example.com/alerting-standards"

    - position: 2
      title: "First DevOps Contribution"
      description: "Deliver your first real DevOps change safely through the normal review and deployment process"
      steps:
        - position: 0
          title: "Watch the incident and on-call process video"
          description: "Overview of how incidents, escalations and on-call responsibilities work"
          type: VIDEO
          estimatedMinutes: 30
          expectedOutcome: "Understand how operational incidents are handled and when to escalate"
          tasks: [ ]
          resources:
            - title: "Incident and On-Call Process Video"
              description: "Walkthrough of our incident response and on-call workflow"
              url: "https://internal.example.com/videos/incident-on-call-process"

        - position: 1
          title: "Read the runbook and incident response guide"
          description: "Learn how to follow runbooks, document incidents and communicate during outages"
          type: DOCUMENT
          estimatedMinutes: 45
          expectedOutcome: "Know how to respond to common operational issues using documented procedures"
          tasks:
            - position: 0
              title: "Read the incident severity definitions"
              description: "Understand how incidents are classified"
            - position: 1
              title: "Read the escalation process"
              description: "Know when and how to involve other engineers or teams"
            - position: 2
              title: "Read the communication templates"
              description: "Understand how updates are shared internally and externally"
            - position: 3
              title: "Read the postmortem process"
              description: "Learn how incidents are reviewed after resolution"
          resources:
            - title: "Incident Response Guide"
              description: "Main documentation for incident handling"
              url: "https://internal.example.com/incident-response"
            - title: "Production Runbooks"
              description: "Runbooks for common production issues"
              url: "https://internal.example.com/production-runbooks"

        - position: 2
          title: "Perform a safe staging deployment"
          description: "Deploy an approved change to staging and verify the result"
          type: TASK
          estimatedMinutes: 90
          expectedOutcome: "Successfully deploy and verify a change in staging"
          tasks:
            - position: 0
              title: "Select an approved staging change"
              description: "Pick a small change that is ready for staging deployment"
            - position: 1
              title: "Review the pipeline output"
              description: "Check build, test and scan results before deployment"
            - position: 2
              title: "Trigger or monitor the staging deployment"
              description: "Follow the documented deployment process"
            - position: 3
              title: "Verify rollout status"
              description: "Confirm the new version rolled out successfully"
            - position: 4
              title: "Run smoke checks"
              description: "Verify the service still responds correctly after deployment"
            - position: 5
              title: "Check logs and dashboards"
              description: "Look for errors, latency spikes or abnormal resource usage"
          resources:
            - title: "Staging Deployment Guide"
              description: "How to deploy and verify changes in staging"
              url: "https://internal.example.com/staging-deployment"
            - title: "Smoke Test Checklist"
              description: "Checks to run after a deployment"
              url: "https://internal.example.com/smoke-test-checklist"

        - position: 3
          title: "Complete your first infrastructure change"
          description: "Make a small infrastructure-as-code change and get it reviewed"
          type: TASK
          estimatedMinutes: 120
          expectedOutcome: "First infrastructure change reviewed, planned and applied safely"
          tasks:
            - position: 0
              title: "Pick a small infrastructure ticket"
              description: "Choose a low-risk starter task from the DevOps board"
            - position: 1
              title: "Create a feature branch"
              description: "Branch from the current main branch and keep the change focused"
            - position: 2
              title: "Update the Terraform or Helm configuration"
              description: "Make the required configuration change following team conventions"
            - position: 3
              title: "Run formatting and validation"
              description: "Run the documented format, lint and validation commands"
            - position: 4
              title: "Generate a plan or rendered manifest"
              description: "Attach the Terraform plan or rendered Helm output to the review"
            - position: 5
              title: "Open a PR and request review"
              description: "Explain the change, risk level and rollback approach"
            - position: 6
              title: "Address review feedback"
              description: "Apply requested changes and update the plan if necessary"
          resources:
            - title: "DevOps Good First Issues"
              description: "Board filtered for starter DevOps and infrastructure tasks"
              url: "https://internal.example.com/jira/devops-good-first-issues"
            - title: "Infrastructure PR Template"
              description: "Template for documenting infrastructure changes"
              url: "https://internal.example.com/infrastructure-pr-template"

        - position: 4
          title: "Improve or create a runbook"
          description: "Update operational documentation based on what you learned during onboarding"
          type: TASK
          estimatedMinutes: 60
          expectedOutcome: "A useful runbook improvement merged or published"
          tasks:
            - position: 0
              title: "Choose an existing runbook or missing procedure"
              description: "Find one area where documentation can be improved"
            - position: 1
              title: "Validate the current steps"
              description: "Test whether the documented commands and explanations are still correct"
            - position: 2
              title: "Add missing context"
              description: "Document prerequisites, expected output and rollback notes"
            - position: 3
              title: "Ask a teammate to review"
              description: "Have an experienced engineer check the update"
            - position: 4
              title: "Publish the runbook update"
              description: "Merge or publish the improved documentation"
          resources:
            - title: "Runbook Writing Guide"
              description: "How to write useful operational runbooks"
              url: "https://internal.example.com/runbook-writing-guide"
            - title: "Operations Documentation"
              description: "Main area for DevOps and platform documentation"
              url: "https://internal.example.com/operations-docs"