paths:
  - phases:
    - position: 0
      title: "Backend Foundations"
      description: "Get familiar with our backend architecture, development standards, local setup and API conventions"
      steps:
        - position: 0
          title: "Watch the backend architecture overview"
          description: "High-level walkthrough of our backend services, modules, data flow and external integrations"
          type: VIDEO
          estimatedMinutes: 35
          expectedOutcome: "Understand how the backend is structured, how modules interact and how requests flow through the system"
          tasks: [ ]
          resources:
            - title: "Backend Architecture Overview Video"
              description: "Introduction to backend modules, services, APIs and database usage"
              url: "https://internal.example.com/videos/backend-architecture"

        - position: 1
          title: "Read the backend coding standards"
          description: "Learn our conventions for services, controllers, repositories, DTOs, validation and error handling"
          type: DOCUMENT
          estimatedMinutes: 45
          expectedOutcome: "Know how backend code should be structured, named and reviewed"
          tasks:
            - position: 0
              title: "Read the package structure guidelines"
              description: "Understand where controllers, services, models, repositories and mappers belong"
            - position: 1
              title: "Read the service layer conventions"
              description: "Learn how business logic should be organized"
            - position: 2
              title: "Read the DTO and mapping rules"
              description: "Understand how request and response models are used"
            - position: 3
              title: "Read the error handling rules"
              description: "Learn how validation errors, not found cases and business rule violations are returned"
            - position: 4
              title: "Read the logging guidelines"
              description: "Understand when and how backend services should log information"
          resources:
            - title: "Backend Coding Standards"
              description: "Main coding conventions for backend development"
              url: "https://internal.example.com/backend-coding-standards"
            - title: "Backend Error Handling Guide"
              description: "How backend errors and exceptions should be handled"
              url: "https://internal.example.com/backend-error-handling"

        - position: 2
          title: "Set up the backend development environment"
          description: "Install dependencies, configure local services and run the backend locally"
          type: TASK
          estimatedMinutes: 75
          expectedOutcome: "Backend running locally with database, configuration and developer tooling working"
          tasks:
            - position: 0
              title: "Install the required JDK or runtime"
              description: "Use the backend runtime version specified by the project"
            - position: 1
              title: "Install Docker"
              description: "Verify that local containers can be started"
            - position: 2
              title: "Start local infrastructure"
              description: "Run the database and other required services using Docker Compose"
            - position: 3
              title: "Configure local environment variables"
              description: "Create the local environment file from the provided example"
            - position: 4
              title: "Run the backend application"
              description: "Start the service locally and verify that it boots successfully"
            - position: 5
              title: "Open the health endpoint"
              description: "Check that the application health endpoint returns a successful response"
            - position: 6
              title: "Open the API documentation"
              description: "Verify that Swagger or OpenAPI documentation is available locally"
          resources:
            - title: "Backend Local Setup Guide"
              description: "Step-by-step instructions for running the backend locally"
              url: "https://internal.example.com/backend-local-setup"
            - title: "Local Infrastructure Guide"
              description: "How to start and inspect local database and service dependencies"
              url: "https://internal.example.com/local-infrastructure"

        - position: 3
          title: "Read the API design and documentation guide"
          description: "Learn how REST endpoints, request models, response models and OpenAPI documentation are designed"
          type: DOCUMENT
          estimatedMinutes: 40
          expectedOutcome: "Know how to design consistent backend APIs and document them clearly"
          tasks:
            - position: 0
              title: "Read the URL naming conventions"
              description: "Understand how endpoints, path variables and nested resources are named"
            - position: 1
              title: "Read the request and response rules"
              description: "Learn how API payloads should be structured"
            - position: 2
              title: "Read the status code conventions"
              description: "Understand when to return 200, 201, 204, 400, 401, 403 and 404"
            - position: 3
              title: "Read the OpenAPI annotation rules"
              description: "Learn how endpoints should be documented for API consumers"
          resources:
            - title: "API Design Guide"
              description: "REST API conventions used by backend teams"
              url: "https://internal.example.com/api-design-guide"
            - title: "OpenAPI Documentation Guide"
              description: "How to document backend endpoints and DTOs"
              url: "https://internal.example.com/openapi-guide"

        - position: 4
          title: "Explore the database model"
          description: "Review entities, migrations, relationships and database access patterns"
          type: TASK
          estimatedMinutes: 65
          expectedOutcome: "Understand the main database tables, relationships and repository access patterns"
          tasks:
            - position: 0
              title: "Review the main domain entities"
              description: "Inspect the most important backend entities and their relationships"
            - position: 1
              title: "Review database migrations or schema setup"
              description: "Understand how schema changes are applied"
            - position: 2
              title: "Inspect repository interfaces"
              description: "Learn how queries are expressed and reused"
            - position: 3
              title: "Check transaction boundaries"
              description: "Understand where read-only and write transactions are declared"
            - position: 4
              title: "Run a local database query"
              description: "Connect to the local database and inspect sample data"
          resources:
            - title: "Database Model Overview"
              description: "Overview of important tables, relationships and persistence rules"
              url: "https://internal.example.com/database-model-overview"
            - title: "Repository Guide"
              description: "How database access is implemented in the backend"
              url: "https://internal.example.com/repository-guide"

    - position: 1
      title: "Codebase and Runtime Walkthrough"
      description: "Understand how backend features are implemented, tested, secured and operated"
      steps:
        - position: 0
          title: "Watch the request lifecycle walkthrough"
          description: "Walkthrough of a backend request from controller to service, repository and response"
          type: VIDEO
          estimatedMinutes: 35
          expectedOutcome: "Understand how a request is handled end to end inside the backend"
          tasks: [ ]
          resources:
            - title: "Backend Request Lifecycle Video"
              description: "Walkthrough of controller, validation, service logic, persistence and response mapping"
              url: "https://internal.example.com/videos/backend-request-lifecycle"

        - position: 1
          title: "Read the testing strategy"
          description: "Learn how backend unit tests, controller tests, integration tests and contract checks are structured"
          type: DOCUMENT
          estimatedMinutes: 45
          expectedOutcome: "Know which backend tests to write for different kinds of changes"
          tasks:
            - position: 0
              title: "Read the unit testing rules"
              description: "Understand how service and mapper logic should be tested"
            - position: 1
              title: "Read the controller testing rules"
              description: "Learn how HTTP endpoints, validation and security are tested"
            - position: 2
              title: "Read the integration testing rules"
              description: "Understand when database or full application context tests are needed"
            - position: 3
              title: "Read the test data rules"
              description: "Learn how fixtures, builders and sample payloads are maintained"
          resources:
            - title: "Backend Testing Strategy"
              description: "Testing standards for backend services"
              url: "https://internal.example.com/backend-testing-strategy"
            - title: "Backend Test Examples"
              description: "Examples of unit, controller and integration tests"
              url: "https://internal.example.com/backend-test-examples"

        - position: 2
          title: "Run and inspect the backend test suite"
          description: "Execute backend tests locally and understand common test outputs and failures"
          type: TASK
          estimatedMinutes: 70
          expectedOutcome: "Know how to run tests locally and investigate backend test failures"
          tasks:
            - position: 0
              title: "Run the full backend test suite"
              description: "Execute the standard test command used by the team"
            - position: 1
              title: "Run a single test class"
              description: "Execute tests for one selected controller or service"
            - position: 2
              title: "Inspect a passing test report"
              description: "Review where reports are generated and how results are displayed"
            - position: 3
              title: "Inspect a failing test"
              description: "Understand how assertion failures and stack traces are shown"
            - position: 4
              title: "Run static checks"
              description: "Execute linting, formatting or quality checks used by CI"
          resources:
            - title: "Backend Test Running Guide"
              description: "How to run backend tests and checks locally"
              url: "https://internal.example.com/backend-test-running"
            - title: "CI Checks Overview"
              description: "Overview of required automated backend checks"
              url: "https://internal.example.com/backend-ci-checks"

        - position: 3
          title: "Explore authentication and authorization"
          description: "Understand how users, roles, tokens and endpoint permissions are handled"
          type: TASK
          estimatedMinutes: 75
          expectedOutcome: "Know how backend endpoints are secured and how authorization rules are enforced"
          tasks:
            - position: 0
              title: "Review the security configuration"
              description: "Inspect how public and authenticated endpoints are configured"
            - position: 1
              title: "Review role mapping"
              description: "Understand how external roles are mapped to backend permissions"
            - position: 2
              title: "Call an authenticated endpoint locally"
              description: "Use a test token to call a protected API endpoint"
            - position: 3
              title: "Call an endpoint without permissions"
              description: "Verify how unauthorized or forbidden requests are handled"
            - position: 4
              title: "Review method-level authorization"
              description: "Find examples of endpoint or service methods protected by role checks"
          resources:
            - title: "Backend Security Guide"
              description: "How authentication, authorization and role mapping work"
              url: "https://internal.example.com/backend-security-guide"
            - title: "Local Auth Testing Guide"
              description: "How to test authenticated backend requests locally"
              url: "https://internal.example.com/local-auth-testing"

        - position: 4
          title: "Trace a complete backend feature"
          description: "Pick an existing feature and follow it through API, service logic, persistence and tests"
          type: TASK
          estimatedMinutes: 90
          expectedOutcome: "Solid understanding of how complete backend features are implemented"
          tasks:
            - position: 0
              title: "Pick a completed backend feature"
              description: "Choose a feature with controller, service, repository and tests"
            - position: 1
              title: "Trace the API endpoint"
              description: "Start from the controller method and request mapping"
            - position: 2
              title: "Trace the request and response DTOs"
              description: "Find the models used by the endpoint"
            - position: 3
              title: "Trace the service method"
              description: "Understand the business logic and validation rules"
            - position: 4
              title: "Trace repository usage"
              description: "Find database queries and persistence changes"
            - position: 5
              title: "Trace the tests"
              description: "Review how the feature is covered by automated tests"
            - position: 6
              title: "Write down questions"
              description: "Note unclear decisions or implementation details to discuss with your mentor"
          resources:
            - title: "Backend Feature Walkthrough Example"
              description: "Example of tracing a backend feature through the codebase"
              url: "https://internal.example.com/backend-feature-walkthrough"
            - title: "Backend Module Overview"
              description: "Overview of main backend modules and responsibilities"
              url: "https://internal.example.com/backend-module-overview"

        - position: 5
          title: "Read the observability and production behavior guide"
          description: "Learn how backend logs, metrics, traces and health checks are used in production"
          type: DOCUMENT
          estimatedMinutes: 40
          expectedOutcome: "Know how backend services expose operational information and how issues are investigated"
          tasks:
            - position: 0
              title: "Read the logging conventions"
              description: "Understand what should and should not be logged"
            - position: 1
              title: "Read the metrics overview"
              description: "Learn which service metrics are tracked"
            - position: 2
              title: "Read the health check rules"
              description: "Understand readiness, liveness and dependency checks"
            - position: 3
              title: "Read the tracing overview"
              description: "Learn how request traces are used to debug distributed flows"
          resources:
            - title: "Backend Observability Guide"
              description: "How backend services expose logs, metrics, traces and health checks"
              url: "https://internal.example.com/backend-observability"
            - title: "Production Debugging Guide"
              description: "How to investigate backend problems in production-like environments"
              url: "https://internal.example.com/backend-production-debugging"

    - position: 2
      title: "First Backend Contribution"
      description: "Deliver your first real backend change through the normal development, testing and review process"
      steps:
        - position: 0
          title: "Watch the backend PR and review process video"
          description: "How backend changes are prepared, reviewed, tested and merged"
          type: VIDEO
          estimatedMinutes: 25
          expectedOutcome: "Know what a good backend PR looks like and what reviewers expect"
          tasks: [ ]
          resources:
            - title: "Backend PR Process Video"
              description: "Walkthrough of opening, reviewing and merging backend changes"
              url: "https://internal.example.com/videos/backend-pr-process"

        - position: 1
          title: "Read the backend PR checklist"
          description: "Learn what must be checked before requesting a backend code review"
          type: DOCUMENT
          estimatedMinutes: 35
          expectedOutcome: "Know how to self-review backend changes before opening a PR"
          tasks:
            - position: 0
              title: "Read the functionality checklist"
              description: "Verify that the implementation satisfies the ticket requirements"
            - position: 1
              title: "Read the API compatibility checklist"
              description: "Check whether the change affects existing API consumers"
            - position: 2
              title: "Read the database change checklist"
              description: "Understand what to check when entities, migrations or queries change"
            - position: 3
              title: "Read the test coverage checklist"
              description: "Know what test coverage is expected for backend changes"
            - position: 4
              title: "Read the security checklist"
              description: "Check authorization, validation and sensitive data handling"
          resources:
            - title: "Backend PR Checklist"
              description: "Pre-review checklist for backend changes"
              url: "https://internal.example.com/backend-pr-checklist"
            - title: "Backend Review Guidelines"
              description: "How backend pull requests are reviewed"
              url: "https://internal.example.com/backend-review-guidelines"

        - position: 2
          title: "Implement a small backend endpoint change"
          description: "Pick up a low-risk backend ticket and implement a focused API or service change"
          type: TASK
          estimatedMinutes: 130
          expectedOutcome: "First backend feature or endpoint change implemented and ready for review"
          tasks:
            - position: 0
              title: "Pick a good-first backend ticket"
              description: "Choose a small, low-risk backend task with your mentor"
            - position: 1
              title: "Review the requirements"
              description: "Read the ticket, acceptance criteria and API expectations"
            - position: 2
              title: "Create a feature branch"
              description: "Branch from the current main development branch"
            - position: 3
              title: "Update request or response models"
              description: "Add or adjust DTOs if the API contract requires it"
            - position: 4
              title: "Implement service logic"
              description: "Add the business logic, validation and repository access"
            - position: 5
              title: "Update controller endpoint"
              description: "Expose the behavior through the required API route"
            - position: 6
              title: "Add or update OpenAPI documentation"
              description: "Document the endpoint behavior, responses and request schema"
            - position: 7
              title: "Run the application locally"
              description: "Verify that the backend starts and the endpoint is reachable"
          resources:
            - title: "Backend Good First Issues"
              description: "Board filtered for low-risk backend starter tickets"
              url: "https://internal.example.com/jira/backend-good-first-issues"
            - title: "Endpoint Implementation Example"
              description: "Example of adding a backend endpoint end to end"
              url: "https://internal.example.com/backend-endpoint-example"

        - position: 3
          title: "Add tests for the backend change"
          description: "Write or update automated tests that cover the new backend behavior"
          type: TASK
          estimatedMinutes: 100
          expectedOutcome: "Backend change covered by meaningful automated tests"
          tasks:
            - position: 0
              title: "Add service tests"
              description: "Cover business logic, validation and error cases"
            - position: 1
              title: "Add controller tests"
              description: "Cover request handling, status codes and response bodies"
            - position: 2
              title: "Add repository or integration tests if needed"
              description: "Cover database behavior when the change depends on persistence logic"
            - position: 3
              title: "Test unauthorized or forbidden access"
              description: "Verify security behavior for protected endpoints if applicable"
            - position: 4
              title: "Run targeted tests"
              description: "Execute the test classes affected by the change"
            - position: 5
              title: "Run full checks"
              description: "Run the full backend verification command before opening the PR"
          resources:
            - title: "Backend Test Writing Guide"
              description: "How to write useful backend tests"
              url: "https://internal.example.com/backend-test-writing-guide"
            - title: "Security Test Examples"
              description: "Examples for testing protected backend endpoints"
              url: "https://internal.example.com/security-test-examples"

        - position: 4
          title: "Open a backend PR and address feedback"
          description: "Submit the backend change for review and iterate on reviewer comments"
          type: TASK
          estimatedMinutes: 90
          expectedOutcome: "First backend PR reviewed, improved and merged"
          tasks:
            - position: 0
              title: "Write a clear PR description"
              description: "Explain what changed, why it changed and how it was tested"
            - position: 1
              title: "Link the related ticket"
              description: "Connect the PR to the issue or requirement it implements"
            - position: 2
              title: "Include API examples if useful"
              description: "Add sample requests or responses for endpoint changes"
            - position: 3
              title: "Request backend review"
              description: "Ask the appropriate backend teammate to review the PR"
            - position: 4
              title: "Address review comments"
              description: "Apply requested changes and explain any trade-offs"
            - position: 5
              title: "Verify CI is green"
              description: "Confirm all automated checks pass before merge"
            - position: 6
              title: "Merge using the team process"
              description: "Follow the team's merge strategy and branch cleanup rules"
          resources:
            - title: "Backend PR Template"
              description: "Template for documenting backend changes"
              url: "https://internal.example.com/backend-pr-template"
            - title: "Backend Review Checklist"
              description: "Reviewer checklist for backend pull requests"
              url: "https://internal.example.com/backend-review-checklist"

        - position: 5
          title: "Improve backend documentation"
          description: "Update one backend guide, README section or API documentation page based on what you learned"
          type: TASK
          estimatedMinutes: 60
          expectedOutcome: "A useful backend documentation improvement reviewed and published"
          tasks:
            - position: 0
              title: "Choose a documentation improvement"
              description: "Find one unclear, outdated or missing backend documentation area"
            - position: 1
              title: "Validate the current instructions"
              description: "Check whether the documented commands and explanations still work"
            - position: 2
              title: "Add missing context"
              description: "Clarify setup steps, API behavior, configuration or troubleshooting notes"
            - position: 3
              title: "Ask for team review"
              description: "Have another backend developer verify correctness"
            - position: 4
              title: "Publish the documentation update"
              description: "Merge or publish the updated documentation"
          resources:
            - title: "Backend Documentation Guide"
              description: "How backend documentation should be written and maintained"
              url: "https://internal.example.com/backend-documentation-guide"
            - title: "Backend Knowledge Base"
              description: "Main location for backend documentation, guides and troubleshooting notes"
              url: "https://internal.example.com/backend-knowledge-base"