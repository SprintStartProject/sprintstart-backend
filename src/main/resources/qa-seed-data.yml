
paths:
  - phases:
    - position: 0
      title: "QA Foundations"
      description: "Get familiar with our QA strategy, testing responsibilities, tools and quality standards"
      steps:
        - position: 0
          title: "Watch the QA team overview"
          description: "High-level introduction to the QA team's role, responsibilities and collaboration with development teams"
          type: VIDEO
          estimatedMinutes: 30
          expectedOutcome: "Understand how QA contributes to product quality and how the QA team works with developers and product managers"
          tasks: [ ]
          resources:
            - title: "QA Team Overview Video"
              description: "Introduction to our QA process, responsibilities and quality mindset"
              url: "https://internal.example.com/videos/qa-overview"

        - position: 1
          title: "Read the QA strategy and testing standards"
          description: "Learn our approach to manual testing, automated testing, regression testing and release quality"
          type: DOCUMENT
          estimatedMinutes: 45
          expectedOutcome: "Know the main testing levels, responsibilities and quality gates used by the team"
          tasks:
            - position: 0
              title: "Read the test pyramid guidelines"
              description: "Understand the balance between unit, integration, API, UI and exploratory tests"
            - position: 1
              title: "Read the definition of done"
              description: "Learn what quality requirements must be met before work is considered complete"
            - position: 2
              title: "Read the regression testing process"
              description: "Understand when regression testing is required and how it is planned"
            - position: 3
              title: "Read the release quality gates"
              description: "Learn which checks must pass before a release can move forward"
          resources:
            - title: "QA Strategy"
              description: "Our testing principles, quality goals and QA responsibilities"
              url: "https://internal.example.com/qa-strategy"
            - title: "Testing Standards"
              description: "Standards for writing, running and documenting tests"
              url: "https://internal.example.com/testing-standards"

        - position: 2
          title: "Set up QA tools and test environments"
          description: "Get access to the tools and environments required for QA work"
          type: TASK
          estimatedMinutes: 70
          expectedOutcome: "QA tooling and test environments are accessible and ready to use"
          tasks:
            - position: 0
              title: "Access the test management system"
              description: "Log in and verify access to test cases, test plans and test runs"
            - position: 1
              title: "Access the issue tracker"
              description: "Verify permissions for creating, updating and linking bug tickets"
            - position: 2
              title: "Access staging and QA environments"
              description: "Confirm that you can open and use the required test environments"
            - position: 3
              title: "Configure browser testing tools"
              description: "Install or configure supported browsers, dev tools and testing extensions"
            - position: 4
              title: "Set up API testing tools"
              description: "Install and configure Postman, Bruno or the team's preferred API testing tool"
            - position: 5
              title: "Verify test user accounts"
              description: "Check that you have access to test users with the required roles and permissions"
          resources:
            - title: "QA Tool Setup Guide"
              description: "Step-by-step setup instructions for QA tools and environments"
              url: "https://internal.example.com/qa-tool-setup"
            - title: "Test Environment Overview"
              description: "Overview of available QA, staging and production-like environments"
              url: "https://internal.example.com/test-environments"

        - position: 3
          title: "Read the bug reporting and triage guide"
          description: "Learn how defects are reported, prioritized, reproduced and tracked"
          type: DOCUMENT
          estimatedMinutes: 40
          expectedOutcome: "Know how to create useful bug reports and support the triage process"
          tasks:
            - position: 0
              title: "Read the bug severity definitions"
              description: "Understand how critical, major, minor and cosmetic issues are classified"
            - position: 1
              title: "Read the bug report template"
              description: "Learn what information every bug report should include"
            - position: 2
              title: "Read the reproduction guidelines"
              description: "Understand how to document reliable reproduction steps"
            - position: 3
              title: "Read the triage workflow"
              description: "Learn how bugs are reviewed, assigned and prioritized"
          resources:
            - title: "Bug Reporting Guide"
              description: "How to report clear, complete and actionable bugs"
              url: "https://internal.example.com/bug-reporting"
            - title: "Bug Triage Process"
              description: "How defects are categorized, prioritized and assigned"
              url: "https://internal.example.com/bug-triage"

        - position: 4
          title: "Explore existing test documentation"
          description: "Review current test plans, checklists and test case structure"
          type: TASK
          estimatedMinutes: 55
          expectedOutcome: "Understand how QA documentation is organized and how test coverage is tracked"
          tasks:
            - position: 0
              title: "Open the main test case repository"
              description: "Find where manual and automated test cases are documented"
            - position: 1
              title: "Review one feature test plan"
              description: "Look at the test plan for an existing product feature"
            - position: 2
              title: "Review a regression checklist"
              description: "Understand how recurring release checks are documented"
            - position: 3
              title: "Review test case naming conventions"
              description: "Learn how test cases are named, grouped and maintained"
            - position: 4
              title: "Note unclear or outdated documentation"
              description: "Write down anything that should be clarified with the QA lead"
          resources:
            - title: "Test Case Repository"
              description: "Main location for manual test cases and QA checklists"
              url: "https://internal.example.com/test-case-repository"
            - title: "Regression Checklist"
              description: "Checklist used for regular regression testing"
              url: "https://internal.example.com/regression-checklist"

    - position: 1
      title: "Product and Testing Workflow Walkthrough"
      description: "Understand how features are tested, validated, automated and prepared for release"
      steps:
        - position: 0
          title: "Watch the feature testing workflow"
          description: "Walkthrough of how QA validates a feature from ticket review to release approval"
          type: VIDEO
          estimatedMinutes: 35
          expectedOutcome: "Understand the end-to-end QA workflow for a product feature"
          tasks: [ ]
          resources:
            - title: "Feature Testing Workflow Video"
              description: "Walkthrough of ticket review, test design, execution, bug reporting and sign-off"
              url: "https://internal.example.com/videos/feature-testing-workflow"

        - position: 1
          title: "Read the test planning guide"
          description: "Learn how test scenarios are derived from requirements and acceptance criteria"
          type: DOCUMENT
          estimatedMinutes: 45
          expectedOutcome: "Know how to create meaningful test cases from product requirements"
          tasks:
            - position: 0
              title: "Read the acceptance criteria review process"
              description: "Understand how QA checks whether a ticket is testable"
            - position: 1
              title: "Read the test scenario design rules"
              description: "Learn how to cover happy paths, edge cases and negative cases"
            - position: 2
              title: "Read the risk-based testing approach"
              description: "Understand how to prioritize testing based on user impact and technical risk"
            - position: 3
              title: "Read the sign-off expectations"
              description: "Learn what evidence is needed before QA approves a change"
          resources:
            - title: "Test Planning Guide"
              description: "How to design test cases and test scenarios"
              url: "https://internal.example.com/test-planning"
            - title: "Risk-Based Testing Guide"
              description: "How to prioritize QA effort based on impact and risk"
              url: "https://internal.example.com/risk-based-testing"

        - position: 2
          title: "Explore a completed feature test cycle"
          description: "Trace one completed feature from requirements through QA approval"
          type: TASK
          estimatedMinutes: 75
          expectedOutcome: "Understand how QA work is documented and connected to tickets, bugs and releases"
          tasks:
            - position: 0
              title: "Pick a completed feature"
              description: "Choose a recently completed feature with QA involvement"
            - position: 1
              title: "Review the original ticket"
              description: "Read requirements, acceptance criteria and linked design notes"
            - position: 2
              title: "Review the related test cases"
              description: "Find the test scenarios used to validate the feature"
            - position: 3
              title: "Review linked bug reports"
              description: "Check which defects were found during testing"
            - position: 4
              title: "Review QA sign-off notes"
              description: "Understand what evidence was provided before approval"
            - position: 5
              title: "Write down questions"
              description: "Note anything unclear to discuss with your mentor"
          resources:
            - title: "Feature QA Example"
              description: "Example of a completed feature QA cycle"
              url: "https://internal.example.com/feature-qa-example"
            - title: "QA Sign-Off Examples"
              description: "Examples of good QA approval comments and evidence"
              url: "https://internal.example.com/qa-signoff-examples"

        - position: 3
          title: "Read the automated testing overview"
          description: "Learn how automated tests are structured, maintained and executed in CI"
          type: DOCUMENT
          estimatedMinutes: 50
          expectedOutcome: "Understand which tests are automated and how QA contributes to automation"
          tasks:
            - position: 0
              title: "Read the UI automation structure"
              description: "Understand how end-to-end and browser tests are organized"
            - position: 1
              title: "Read the API automation structure"
              description: "Learn how API tests are written and executed"
            - position: 2
              title: "Read the test data strategy"
              description: "Understand how automated tests create, isolate and clean up test data"
            - position: 3
              title: "Read the flaky test handling process"
              description: "Learn how unstable tests are detected, reported and fixed"
          resources:
            - title: "Automated Testing Overview"
              description: "Overview of our automated UI, API and integration tests"
              url: "https://internal.example.com/automated-testing-overview"
            - title: "Flaky Test Handling Guide"
              description: "How unstable automated tests are investigated and resolved"
              url: "https://internal.example.com/flaky-test-guide"

        - position: 4
          title: "Run existing automated tests locally"
          description: "Execute automated test suites and inspect their output"
          type: TASK
          estimatedMinutes: 80
          expectedOutcome: "Know how to run automated tests and interpret failures"
          tasks:
            - position: 0
              title: "Clone the test automation repository"
              description: "Set up the repository that contains automated QA tests"
            - position: 1
              title: "Install test dependencies"
              description: "Install the required packages, browsers or test runners"
            - position: 2
              title: "Run a smoke test suite"
              description: "Execute the smallest test suite used for quick validation"
            - position: 3
              title: "Run a feature-specific test suite"
              description: "Execute tests for one selected product area"
            - position: 4
              title: "Inspect a passing test report"
              description: "Review logs, screenshots, traces or generated reports"
            - position: 5
              title: "Inspect a failing test report"
              description: "Understand how failures are displayed and investigated"
          resources:
            - title: "QA Automation Setup Guide"
              description: "How to install and run automated QA tests locally"
              url: "https://internal.example.com/qa-automation-setup"
            - title: "Test Report Guide"
              description: "How to read automated test reports and debug failures"
              url: "https://internal.example.com/test-report-guide"

        - position: 5
          title: "Explore release testing and regression flow"
          description: "Understand how QA supports release preparation and regression validation"
          type: TASK
          estimatedMinutes: 65
          expectedOutcome: "Know how release candidates are validated before deployment"
          tasks:
            - position: 0
              title: "Review the release testing checklist"
              description: "Understand which areas must be tested before a release"
            - position: 1
              title: "Review the smoke test process"
              description: "Learn which checks are performed after deployment to staging"
            - position: 2
              title: "Review regression ownership"
              description: "Understand who tests which areas during a release cycle"
            - position: 3
              title: "Review release blocker rules"
              description: "Learn what kinds of issues block a release"
            - position: 4
              title: "Review release sign-off history"
              description: "Look at how recent releases were approved by QA"
          resources:
            - title: "Release Testing Guide"
              description: "How QA validates releases before production deployment"
              url: "https://internal.example.com/release-testing"
            - title: "Release Blocker Policy"
              description: "Rules for deciding whether a bug blocks a release"
              url: "https://internal.example.com/release-blocker-policy"

    - position: 2
      title: "First QA Contribution"
      description: "Take ownership of a small QA task and complete it through the normal testing, reporting and review process"
      steps:
        - position: 0
          title: "Watch the QA review and sign-off process"
          description: "Overview of how QA reviews tickets, documents evidence and approves changes"
          type: VIDEO
          estimatedMinutes: 25
          expectedOutcome: "Know what a good QA review looks like and how approval is communicated"
          tasks: [ ]
          resources:
            - title: "QA Review and Sign-Off Video"
              description: "Walkthrough of QA approval, test evidence and release communication"
              url: "https://internal.example.com/videos/qa-review-signoff"

        - position: 1
          title: "Read the exploratory testing guide"
          description: "Learn how to test beyond predefined cases and identify unexpected issues"
          type: DOCUMENT
          estimatedMinutes: 35
          expectedOutcome: "Know how to perform structured exploratory testing and document findings"
          tasks:
            - position: 0
              title: "Read the exploratory testing charter format"
              description: "Understand how exploratory sessions are planned"
            - position: 1
              title: "Read the note-taking expectations"
              description: "Learn how observations, risks and defects should be recorded"
            - position: 2
              title: "Read the edge case checklist"
              description: "Review common areas where defects often appear"
            - position: 3
              title: "Read the session debrief process"
              description: "Understand how findings are shared after exploratory testing"
          resources:
            - title: "Exploratory Testing Guide"
              description: "How to plan and document exploratory testing sessions"
              url: "https://internal.example.com/exploratory-testing"
            - title: "Edge Case Checklist"
              description: "Checklist of common edge cases and risk areas"
              url: "https://internal.example.com/edge-case-checklist"

        - position: 2
          title: "Test a small feature ticket"
          description: "Validate a low-risk feature change with support from a mentor"
          type: TASK
          estimatedMinutes: 100
          expectedOutcome: "Successfully test a real feature and provide clear QA feedback"
          tasks:
            - position: 0
              title: "Pick a suitable starter ticket"
              description: "Choose a low-risk feature ticket with your mentor"
            - position: 1
              title: "Review requirements and acceptance criteria"
              description: "Check whether the ticket is complete and testable"
            - position: 2
              title: "Create a short test plan"
              description: "List happy path, edge case and negative test scenarios"
            - position: 3
              title: "Prepare test data"
              description: "Create or identify the accounts, records or configuration needed for testing"
            - position: 4
              title: "Execute manual tests"
              description: "Run through the planned scenarios in the QA or staging environment"
            - position: 5
              title: "Document test evidence"
              description: "Attach screenshots, logs, test results or notes where useful"
            - position: 6
              title: "Share QA feedback"
              description: "Comment on the ticket with results, risks and open questions"
          resources:
            - title: "Starter QA Tickets"
              description: "Board filtered for low-risk QA starter tasks"
              url: "https://internal.example.com/qa-starter-tickets"
            - title: "Manual Test Plan Template"
              description: "Template for creating lightweight feature test plans"
              url: "https://internal.example.com/manual-test-plan-template"

        - position: 3
          title: "Create and verify a bug report"
          description: "Report one real or sample defect using the team's bug reporting process"
          type: TASK
          estimatedMinutes: 75
          expectedOutcome: "Create a complete, reproducible and actionable bug report"
          tasks:
            - position: 0
              title: "Identify a defect or use a sample issue"
              description: "Find a real issue during testing or use a mentor-approved sample defect"
            - position: 1
              title: "Reproduce the issue"
              description: "Confirm the issue can be reproduced reliably"
            - position: 2
              title: "Collect evidence"
              description: "Gather screenshots, logs, request payloads or console errors"
            - position: 3
              title: "Write clear reproduction steps"
              description: "Document exactly how another person can reproduce the issue"
            - position: 4
              title: "Assign severity and affected area"
              description: "Classify the issue using the team's bug severity rules"
            - position: 5
              title: "Ask for review"
              description: "Have your mentor review the bug report for clarity and completeness"
            - position: 6
              title: "Link the bug to the related ticket"
              description: "Connect the bug report to the relevant feature, release or test run"
          resources:
            - title: "Bug Report Template"
              description: "Template for writing complete defect reports"
              url: "https://internal.example.com/bug-report-template"
            - title: "Bug Report Examples"
              description: "Examples of clear and actionable bug reports"
              url: "https://internal.example.com/bug-report-examples"

        - position: 4
          title: "Add or update test cases"
          description: "Improve test coverage by creating or updating QA test cases"
          type: TASK
          estimatedMinutes: 90
          expectedOutcome: "A useful test case update reviewed and added to the QA repository"
          tasks:
            - position: 0
              title: "Choose a feature area"
              description: "Select a product area with missing or outdated test cases"
            - position: 1
              title: "Review existing coverage"
              description: "Check which scenarios are already documented"
            - position: 2
              title: "Identify missing scenarios"
              description: "Look for missing happy paths, edge cases, permission checks or error states"
            - position: 3
              title: "Write new or updated test cases"
              description: "Document preconditions, steps, expected results and test data"
            - position: 4
              title: "Ask for QA review"
              description: "Have another QA engineer review the test case changes"
            - position: 5
              title: "Publish the test case update"
              description: "Save the reviewed test cases in the official QA repository"
          resources:
            - title: "Test Case Writing Guide"
              description: "How to write clear and maintainable QA test cases"
              url: "https://internal.example.com/test-case-writing-guide"
            - title: "QA Knowledge Base"
              description: "Main location for QA documentation, test plans and checklists"
              url: "https://internal.example.com/qa-knowledge-base"

        - position: 5
          title: "Support a release smoke test"
          description: "Participate in smoke testing for a staging or release candidate build"
          type: TASK
          estimatedMinutes: 80
          expectedOutcome: "Contribute to release validation and understand QA release responsibilities"
          tasks:
            - position: 0
              title: "Join a release testing session"
              description: "Participate in a scheduled QA smoke or regression session"
            - position: 1
              title: "Pick assigned smoke test cases"
              description: "Select the checks assigned to you by the QA lead"
            - position: 2
              title: "Execute checks in the target environment"
              description: "Run the assigned tests in staging or the release candidate environment"
            - position: 3
              title: "Record pass or fail results"
              description: "Update the test run with clear outcomes and evidence"
            - position: 4
              title: "Report blockers immediately"
              description: "Escalate any release-blocking issue according to the release process"
            - position: 5
              title: "Join the release debrief"
              description: "Review findings, risks and follow-up actions with the team"
          resources:
            - title: "Smoke Test Checklist"
              description: "Checklist used for quick release validation"
              url: "https://internal.example.com/smoke-test-checklist"
            - title: "Release QA Board"
              description: "Board for release testing tasks and QA sign-off"
              url: "https://internal.example.com/release-qa-board"