paths:
  - userId: "00000000-0000-0000-0000-000000000003"
    phases:
      - position: 1
        title: "Orientation"
        description: "Get familiar with the company"
        steps:
          - position: 1
            title: "Read the handbook"
            description: "Go through the employee handbook"
            type: TASK
            estimatedMinutes: 30
            expectedOutcome: "Understand company policies"
            tasks:
              - position: 1
                title: "Read section 1"
                description: "Company values"
              - position: 2
                title: "Read section 2"
                description: "Code of conduct"
              - position: 3
                title: "Read section 3"
                description: "Benefits and perks"
            resources:
              - title: "Employee Handbook"
                description: "The full handbook"
                url: "https://internal.example.com/handbook"
          - position: 2
            title: "Watch company intro video"
            description: "A short video introduction from the CEO"
            type: VIDEO
            estimatedMinutes: 15
            expectedOutcome: "Understand the company mission and vision"
            tasks: [ ]
            resources:
              - title: "CEO Intro Video"
                description: "Welcome message from the CEO"
                url: "https://internal.example.com/videos/ceo-intro"
          - position: 3
            title: "Review org chart"
            description: "Familiarize yourself with the team structure"
            type: DOCUMENT
            estimatedMinutes: 20
            expectedOutcome: "Know who is who across departments"
            tasks:
              - position: 1
                title: "Identify your direct team"
                description: "Find your team in the org chart"
              - position: 2
                title: "Identify key stakeholders"
                description: "Note down relevant leads and managers"
            resources:
              - title: "Org Chart"
                description: "Current company org chart"
                url: "https://internal.example.com/org-chart"
              - title: "Team Directory"
                description: "Full list of employees with roles"
                url: "https://internal.example.com/directory"
      - position: 2
        title: "Tool Setup"
        description: "Get your development environment ready"
        steps:
          - position: 1
            title: "Set up your laptop"
            description: "Install required software and configure your machine"
            type: TASK
            estimatedMinutes: 60
            expectedOutcome: "Fully configured development environment"
            tasks:
              - position: 1
                title: "Install IDE"
                description: "Install IntelliJ IDEA or preferred IDE"
              - position: 2
                title: "Install Docker"
                description: "Set up Docker Desktop"
              - position: 3
                title: "Clone main repositories"
                description: "Clone and build the core repos"
            resources:
              - title: "Setup Guide"
                description: "Step-by-step environment setup instructions"
                url: "https://internal.example.com/setup-guide"
          - position: 2
            title: "Watch tooling overview"
            description: "Video walkthrough of the tools we use day to day"
            type: VIDEO
            estimatedMinutes: 25
            expectedOutcome: "Familiar with core tools and workflows"
            tasks: [ ]
            resources:
              - title: "Tooling Overview Video"
                description: "Walkthrough of Jira, Confluence, Slack and CI/CD"
                url: "https://internal.example.com/videos/tooling"
          - position: 3
            title: "Read the engineering guidelines"
            description: "Go through our coding standards and PR process"
            type: DOCUMENT
            estimatedMinutes: 40
            expectedOutcome: "Understand how we write and review code"
            tasks:
              - position: 1
                title: "Read coding standards"
                description: "Style guides and naming conventions"
              - position: 2
                title: "Read the PR process"
                description: "How to open, review and merge pull requests"
            resources:
              - title: "Engineering Guidelines"
                description: "Our full engineering handbook"
                url: "https://internal.example.com/engineering-guidelines"
              - title: "PR Template"
                description: "The pull request template we use"
                url: "https://internal.example.com/pr-template"
      - position: 3
        title: "First Contribution"
        description: "Make your first real contribution to the codebase"
        steps:
          - position: 1
            title: "Watch the architecture overview"
            description: "High-level video of our system architecture"
            type: VIDEO
            estimatedMinutes: 30
            expectedOutcome: "Understand how the system fits together"
            tasks: [ ]
            resources:
              - title: "Architecture Overview Video"
                description: "System design and service boundaries explained"
                url: "https://internal.example.com/videos/architecture"
          - position: 2
            title: "Read the contribution guide"
            description: "Understand how to pick up and deliver your first ticket"
            type: DOCUMENT
            estimatedMinutes: 20
            expectedOutcome: "Ready to pick up a starter ticket"
            tasks:
              - position: 1
                title: "Find a good first issue"
                description: "Look for tickets tagged 'good-first-issue' in Jira"
            resources:
              - title: "Contribution Guide"
                description: "How to get started contributing"
                url: "https://internal.example.com/contribution-guide"
          - position: 3
            title: "Complete your first ticket"
            description: "Pick up, implement and merge a starter ticket"
            type: TASK
            estimatedMinutes: 120
            expectedOutcome: "First PR merged to main"
            tasks:
              - position: 1
                title: "Pick up a ticket"
                description: "Assign yourself a good-first-issue"
              - position: 2
                title: "Implement the change"
                description: "Write the code and tests"
              - position: 3
                title: "Open a PR"
                description: "Submit for review following the PR process"
              - position: 4
                title: "Address review feedback"
                description: "Respond to and resolve review comments"
            resources:
              - title: "Good First Issues"
                description: "Filtered Jira board for starter tickets"
                url: "https://internal.example.com/jira/good-first-issues"