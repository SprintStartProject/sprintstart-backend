sprintstart:
  internal-event-secret: ${SPRINTSTART_KEYCLOAK_SHARED_SECRET}
  ai:
    base-url: ${SPRINTSTART_AI_BASE_URL:http://host.docker.internal:8000}
    
spring:
  config:
    import: optional:file:./run.local.env[.properties]

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB
  jpa:
    hibernate:
      ddl-auto: update # create-drop
    show-sql: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI:http://localhost:8081/realms/sprintstart}
          jwk-set-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI:http://localhost:8081/realms/sprintstart/protocol/openid-connect/certs}

app:
  upload:
    directory: uploads
    max-file-size-bytes: 10485760
