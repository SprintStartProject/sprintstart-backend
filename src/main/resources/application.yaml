sprintstart:
  ai:
    base-url: "http://host.docker.internal:8000"
  github:
    cache-path: ${REPO_CACHE_PATH:${java.io.tmpdir}/repos}
    base-url: "https://api.github.com/graphql"
    token: ${GITHUB_PAT}
    cron: "0 2 * * 1" # Every Monday night at 2:00 am
    
spring:
  config:
    import: optional:file:./run.local.env[.properties]

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

app:
  upload:
    directory: uploads
    max-file-size-bytes: 10485760
