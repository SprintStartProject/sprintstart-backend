paths:
  - phases:
    - position: 0
      title: "HR Foundations"
      description: "Get familiar with our HR responsibilities, tools, processes and employee lifecycle"
      steps:
        - position: 0
          title: "Watch the HR department overview"
          description: "High-level walkthrough of the HR team's role, responsibilities and collaboration with other departments"
          type: VIDEO
          estimatedMinutes: 30
          expectedOutcome: "Understand what HR is responsible for and how the team supports employees and managers"
          tasks: [ ]
          resources:
            - title: "HR Department Overview Video"
              description: "Introduction to the HR team, responsibilities and internal processes"
              url: "https://internal.example.com/videos/hr-overview"

        - position: 1
          title: "Read the employee lifecycle guide"
          description: "Learn how HR supports employees from hiring to offboarding"
          type: DOCUMENT
          estimatedMinutes: 45
          expectedOutcome: "Understand the main stages of the employee lifecycle and HR's role in each stage"
          tasks:
            - position: 0
              title: "Read the recruiting overview"
              description: "Understand how candidates move through the hiring process"
            - position: 1
              title: "Read the onboarding process"
              description: "Learn how new employees are prepared and supported"
            - position: 2
              title: "Read the development and feedback process"
              description: "Understand how performance, growth and feedback cycles are handled"
            - position: 3
              title: "Read the offboarding process"
              description: "Learn how resignations, exits and access removal are coordinated"
          resources:
            - title: "Employee Lifecycle Guide"
              description: "Overview of HR responsibilities across the employee journey"
              url: "https://internal.example.com/employee-lifecycle"
            - title: "HR Process Map"
              description: "Visual map of key HR workflows"
              url: "https://internal.example.com/hr-process-map"

        - position: 2
          title: "Set up HR tools and access"
          description: "Get access to the HR systems, communication channels and document repositories"
          type: TASK
          estimatedMinutes: 60
          expectedOutcome: "All required HR systems are accessible and basic navigation is understood"
          tasks:
            - position: 0
              title: "Access the HR information system"
              description: "Log in to the HRIS and verify your permissions"
            - position: 1
              title: "Access the applicant tracking system"
              description: "Log in to the recruiting tool and review the dashboard"
            - position: 2
              title: "Access the document management system"
              description: "Find HR templates, contracts, policies and forms"
            - position: 3
              title: "Join HR communication channels"
              description: "Join the relevant Slack, Teams or email groups"
            - position: 4
              title: "Verify calendar permissions"
              description: "Check access to interview calendars and HR scheduling resources"
          resources:
            - title: "HR Tool Setup Guide"
              description: "Instructions for accessing and configuring HR tools"
              url: "https://internal.example.com/hr-tool-setup"
            - title: "HR Systems Overview"
              description: "List of systems used by the HR team"
              url: "https://internal.example.com/hr-systems"

        - position: 3
          title: "Read the confidentiality and compliance guide"
          description: "Understand how employee data, sensitive documents and legal requirements are handled"
          type: DOCUMENT
          estimatedMinutes: 50
          expectedOutcome: "Know how to handle confidential employee information responsibly"
          tasks:
            - position: 0
              title: "Read the employee data handling rules"
              description: "Understand what information is confidential and how it may be used"
            - position: 1
              title: "Read the document storage policy"
              description: "Learn where contracts, personal data and sensitive files must be stored"
            - position: 2
              title: "Read the access control policy"
              description: "Understand who may access employee records and under what conditions"
            - position: 3
              title: "Read the escalation process"
              description: "Know who to contact for legal, compliance or privacy questions"
          resources:
            - title: "HR Confidentiality Guide"
              description: "Rules for handling sensitive employee information"
              url: "https://internal.example.com/hr-confidentiality"
            - title: "Employee Data Protection Policy"
              description: "Privacy and compliance expectations for employee data"
              url: "https://internal.example.com/employee-data-protection"

    - position: 1
      title: "HR Process Walkthrough"
      description: "Explore core HR workflows including recruiting, onboarding, employee support and internal communication"
      steps:
        - position: 0
          title: "Watch the recruiting workflow walkthrough"
          description: "Step-by-step overview of how open positions, candidates and interviews are managed"
          type: VIDEO
          estimatedMinutes: 35
          expectedOutcome: "Understand the recruiting workflow from job opening to offer"
          tasks: [ ]
          resources:
            - title: "Recruiting Workflow Video"
              description: "Walkthrough of candidate handling, interview coordination and offer preparation"
              url: "https://internal.example.com/videos/recruiting-workflow"

        - position: 1
          title: "Read the recruiting and interview coordination guide"
          description: "Learn how job postings, interviews, candidate communication and feedback are handled"
          type: DOCUMENT
          estimatedMinutes: 45
          expectedOutcome: "Know how to support hiring managers and candidates during the recruiting process"
          tasks:
            - position: 0
              title: "Read the job posting process"
              description: "Understand how new job openings are created and published"
            - position: 1
              title: "Read the candidate communication rules"
              description: "Learn how candidates should be contacted and updated"
            - position: 2
              title: "Read the interview scheduling process"
              description: "Understand how interview slots, participants and reminders are coordinated"
            - position: 3
              title: "Read the feedback collection process"
              description: "Learn how interviewer feedback is gathered and documented"
          resources:
            - title: "Recruiting Guide"
              description: "Main guide for hiring and candidate coordination"
              url: "https://internal.example.com/recruiting-guide"
            - title: "Interview Coordination Checklist"
              description: "Checklist for scheduling and preparing interviews"
              url: "https://internal.example.com/interview-coordination-checklist"

        - position: 2
          title: "Explore the onboarding process"
          description: "Follow how a new employee is prepared before and after their first day"
          type: TASK
          estimatedMinutes: 70
          expectedOutcome: "Understand how HR coordinates employee onboarding across departments"
          tasks:
            - position: 0
              title: "Review a sample onboarding plan"
              description: "Look at the structure of an existing employee onboarding plan"
            - position: 1
              title: "Check pre-boarding tasks"
              description: "Review contract signing, personal data collection and equipment preparation"
            - position: 2
              title: "Review first-day communication"
              description: "Check welcome emails, calendar invites and manager instructions"
            - position: 3
              title: "Trace cross-team dependencies"
              description: "Identify where HR depends on IT, finance, managers or team leads"
            - position: 4
              title: "Note improvement ideas"
              description: "Write down unclear or inefficient parts of the onboarding process"
          resources:
            - title: "Employee Onboarding Guide"
              description: "How new employees are prepared and supported"
              url: "https://internal.example.com/employee-onboarding"
            - title: "New Hire Checklist"
              description: "Checklist used before and after a new employee starts"
              url: "https://internal.example.com/new-hire-checklist"

        - position: 3
          title: "Read the employee support and request handling guide"
          description: "Learn how HR handles employee questions, requests and internal cases"
          type: DOCUMENT
          estimatedMinutes: 40
          expectedOutcome: "Know how to respond to common HR requests and when to escalate"
          tasks:
            - position: 0
              title: "Read the common HR request categories"
              description: "Understand typical requests around contracts, benefits, leave and certificates"
            - position: 1
              title: "Read the response time expectations"
              description: "Learn how quickly different request types should be handled"
            - position: 2
              title: "Read the escalation rules"
              description: "Know when to involve management, payroll, legal or external providers"
            - position: 3
              title: "Read the documentation rules"
              description: "Understand how requests and decisions should be documented"
          resources:
            - title: "Employee Support Guide"
              description: "How HR handles employee requests and questions"
              url: "https://internal.example.com/employee-support-guide"
            - title: "HR Request Templates"
              description: "Standard responses and templates for common HR cases"
              url: "https://internal.example.com/hr-request-templates"

        - position: 4
          title: "Explore payroll and benefits coordination"
          description: "Understand how HR coordinates payroll-relevant changes and employee benefits"
          type: TASK
          estimatedMinutes: 65
          expectedOutcome: "Know which HR actions affect payroll and benefits administration"
          tasks:
            - position: 0
              title: "Review the payroll input timeline"
              description: "Understand deadlines for submitting payroll-relevant changes"
            - position: 1
              title: "Review employee master data fields"
              description: "Learn which employee data is relevant for payroll"
            - position: 2
              title: "Review leave and absence handling"
              description: "Understand how absences are documented and forwarded"
            - position: 3
              title: "Review benefits enrollment steps"
              description: "Learn how employees are added to benefit programs"
            - position: 4
              title: "Identify approval requirements"
              description: "Check which changes require manager, finance or HR lead approval"
          resources:
            - title: "Payroll Coordination Guide"
              description: "How HR prepares and submits payroll-relevant information"
              url: "https://internal.example.com/payroll-coordination"
            - title: "Benefits Administration Guide"
              description: "Overview of employee benefits and enrollment processes"
              url: "https://internal.example.com/benefits-administration"

    - position: 2
      title: "First HR Contribution"
      description: "Take ownership of a small HR task and complete it through the normal review and communication process"
      steps:
        - position: 0
          title: "Watch the HR communication and stakeholder management video"
          description: "Overview of how HR communicates with employees, managers and candidates"
          type: VIDEO
          estimatedMinutes: 25
          expectedOutcome: "Understand how to communicate clearly, professionally and confidentially in HR situations"
          tasks: [ ]
          resources:
            - title: "HR Communication Video"
              description: "Best practices for employee, manager and candidate communication"
              url: "https://internal.example.com/videos/hr-communication"

        - position: 1
          title: "Read the HR templates and tone guide"
          description: "Learn how to write consistent HR messages, emails and internal announcements"
          type: DOCUMENT
          estimatedMinutes: 35
          expectedOutcome: "Know how to use HR templates and adapt messages to the right audience"
          tasks:
            - position: 0
              title: "Read the employee email templates"
              description: "Review templates for common employee communication"
            - position: 1
              title: "Read the candidate email templates"
              description: "Review templates for interview invitations, feedback and rejections"
            - position: 2
              title: "Read the announcement guidelines"
              description: "Understand how internal HR announcements should be written"
            - position: 3
              title: "Read the tone and confidentiality rules"
              description: "Learn how to balance friendliness, clarity and privacy"
          resources:
            - title: "HR Templates"
              description: "Reusable templates for HR communication"
              url: "https://internal.example.com/hr-templates"
            - title: "HR Tone Guide"
              description: "Writing style and communication expectations for HR"
              url: "https://internal.example.com/hr-tone-guide"

        - position: 2
          title: "Coordinate a low-risk HR request"
          description: "Handle a simple employee or manager request with supervision"
          type: TASK
          estimatedMinutes: 75
          expectedOutcome: "Successfully complete a real HR request using the documented process"
          tasks:
            - position: 0
              title: "Pick a suitable starter request"
              description: "Choose a low-risk HR ticket or request with your mentor"
            - position: 1
              title: "Review the request details"
              description: "Check the employee, context, required documents and deadline"
            - position: 2
              title: "Find the relevant policy or template"
              description: "Use the correct internal guide or communication template"
            - position: 3
              title: "Draft the response or action plan"
              description: "Prepare the next step before sending or applying changes"
            - position: 4
              title: "Ask for review"
              description: "Have an experienced HR teammate review the response or action"
            - position: 5
              title: "Complete and document the request"
              description: "Send the response, update the system and record the outcome"
          resources:
            - title: "HR Request Handling Guide"
              description: "How to process and document HR requests"
              url: "https://internal.example.com/hr-request-handling"
            - title: "Starter HR Requests"
              description: "Queue filtered for low-risk HR tasks"
              url: "https://internal.example.com/hr-starter-requests"

        - position: 3
          title: "Support a new hire onboarding case"
          description: "Assist with the preparation and tracking of a new employee onboarding"
          type: TASK
          estimatedMinutes: 90
          expectedOutcome: "Contribute to a new hire onboarding case from preparation to first-day readiness"
          tasks:
            - position: 0
              title: "Select an upcoming new hire"
              description: "Choose an onboarding case with your mentor"
            - position: 1
              title: "Verify required employee data"
              description: "Check that personal data, contract details and start date are complete"
            - position: 2
              title: "Prepare welcome communication"
              description: "Draft or verify the welcome email and first-day information"
            - position: 3
              title: "Coordinate with IT and manager"
              description: "Confirm equipment, accounts, workspace and onboarding schedule"
            - position: 4
              title: "Update the onboarding checklist"
              description: "Mark completed items and document open dependencies"
            - position: 5
              title: "Review the case with your mentor"
              description: "Confirm that everything is ready before the employee starts"
          resources:
            - title: "New Hire Preparation Guide"
              description: "How HR prepares a new employee before the first day"
              url: "https://internal.example.com/new-hire-preparation"
            - title: "Welcome Email Template"
              description: "Template for new hire welcome communication"
              url: "https://internal.example.com/welcome-email-template"

        - position: 4
          title: "Improve an HR document or checklist"
          description: "Update one internal HR document based on what you learned during onboarding"
          type: TASK
          estimatedMinutes: 60
          expectedOutcome: "A useful HR documentation improvement reviewed and published"
          tasks:
            - position: 0
              title: "Choose a document or checklist"
              description: "Find one HR document that is outdated, unclear or incomplete"
            - position: 1
              title: "Validate the current content"
              description: "Check whether the described process still matches reality"
            - position: 2
              title: "Add missing details"
              description: "Clarify responsibilities, deadlines, templates or escalation paths"
            - position: 3
              title: "Ask for HR team review"
              description: "Have a teammate verify correctness and tone"
            - position: 4
              title: "Publish the updated document"
              description: "Update the documentation system and notify relevant team members if needed"
          resources:
            - title: "HR Documentation Guide"
              description: "How to write and maintain internal HR documentation"
              url: "https://internal.example.com/hr-documentation-guide"
            - title: "HR Knowledge Base"
              description: "Main location for HR policies, guides and checklists"
              url: "https://internal.example.com/hr-knowledge-base"