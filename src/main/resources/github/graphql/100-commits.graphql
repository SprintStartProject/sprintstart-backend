query RepoCommits($owner: String!, $name: String!, $cursor: String) {
    repository(owner: $owner, name: $name) {
        defaultBranchRef {
            target {
                ... on Commit {
                    history(first: 100, after: $cursor) {
                        pageInfo {
                            hasNextPage
                            endCursor
                        }
                        nodes {
                            oid
                            messageHeadline
                            message
                            committedDate
                            author {
                                name
                                email
                            }
                            changedFilesIfAvailable
                            url
                        }
                    }
                }
            }
        }
    }
}